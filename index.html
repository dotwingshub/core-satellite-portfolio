<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>コア・サテライト ポートフォリオ分析</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Hiragino Sans','Yu Gothic UI','Meiryo',Arial,sans-serif;
  background:#0E1929;min-height:100vh;color:#1E293B}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
/* NAV */
.nav{position:sticky;top:0;z-index:100;
  background:rgba(8,18,35,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.07)}
.nav-inner{max-width:1440px;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:16px;height:56px}
.logo{font-size:14px;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo small{opacity:.5;font-weight:300;font-size:11px;margin-left:4px}
.tabs{display:flex;gap:4px;margin-left:20px}
.tab{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:inherit;font-size:12px;font-weight:700;transition:all .18s;letter-spacing:.02em}
.tab.on{background:#2563EB;color:#fff;box-shadow:0 2px 12px rgba(37,99,235,.45)}
.tab.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55)}
.tab.off:hover{background:rgba(255,255,255,.13);color:#fff}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.yr-ctrl{display:flex;align-items:center;gap:7px}
.yr-ctrl label{font-size:11px;color:rgba(255,255,255,.45)}
.yr-ctrl input{width:52px;padding:4px 6px;border-radius:7px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.09);
  color:#fff;text-align:center;font-size:14px;font-weight:700;font-family:inherit}
.yr-ctrl input:focus{outline:none;border-color:#2563EB}
/* PAGE */
.page{max-width:1440px;margin:0 auto;padding:26px 24px 48px}
/* SECTION */
.sec{margin-bottom:20px}
.sec-ttl{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec-ttl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
@media(max-width:640px){.g4{grid-template-columns:1fr}.page{padding:14px 12px 40px}}
/* CARD */
.card{background:#fff;border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.1);overflow:hidden}
.card-hd{padding:12px 16px 8px;font-size:10px;font-weight:700;color:#94A3B8;
  letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid #F1F5F9}
.card-bd{padding:16px}
/* KPI */
.kpi{background:#fff;border-radius:16px;padding:18px 18px 14px;
  box-shadow:0 4px 24px rgba(0,0,0,.16);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.bl::before{background:linear-gradient(90deg,#2563EB,#60A5FA)}
.kpi.gr::before{background:linear-gradient(90deg,#059669,#34D399)}
.kpi.am::before{background:linear-gradient(90deg,#D97706,#FCD34D)}
.kpi.vi::before{background:linear-gradient(90deg,#7C3AED,#A78BFA)}
.kpi-ttl{font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.04em;margin-bottom:10px}
.kpi-vals{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}
.kpi-lbl{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;margin-bottom:3px;display:inline-block}
.kpi-lbl.cur{background:#EFF6FF;color:#1D4ED8}
.kpi-lbl.aft{background:#F0FDF4;color:#065F46}
.kpi-val{font-size:16px;font-weight:800;color:#1E293B;line-height:1.1}
.kpi-val.hi{color:#059669}
.kpi-arr{color:#CBD5E1;font-size:18px;text-align:center}
.kpi-note{font-size:10px;min-height:14px;color:#94A3B8}
.diff-up{color:#059669;font-weight:700}
.diff-dn{color:#DC2626;font-weight:700}
/* INSIGHT */
.insight{background:linear-gradient(135deg,#EFF6FF,#F0FDF4);
  border:1px solid #BFDBFE;border-radius:16px;padding:16px 20px;
  display:flex;gap:14px;align-items:flex-start;
  box-shadow:0 2px 12px rgba(37,99,235,.08)}
.insight-pts{display:flex;gap:18px;flex-wrap:wrap;flex:1}
.insight-pt{font-size:11px;color:#334155;line-height:1.75}
/* DONUT */
.donut-wrap{display:flex;gap:0}
.donut-half{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0}
.donut-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.donut-lbl.cur{color:#2563EB}
.donut-lbl.aft{color:#059669}
.donut-sep{width:1px;background:#F1F5F9;margin:6px 0}
.legend{display:flex;flex-wrap:wrap;gap:5px 10px;justify-content:center;margin-top:5px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px}
.legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
/* BAR */
.bar-chart-wrap{width:100%;overflow:visible}
.bar-legend{display:flex;justify-content:center;gap:16px;margin-top:4px}
.bl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#64748B;font-weight:500}
.bl-dot{width:9px;height:9px;border-radius:2px}
/* DETAIL TABLE */
.tbl-scroll{overflow-x:auto}
.dtbl{width:100%;border-collapse:collapse;min-width:820px}
.dtbl th{padding:7px 11px;font-size:9px;font-weight:700;color:#94A3B8;
  background:#F8FAFC;white-space:nowrap;border-bottom:2px solid #E2E8F0}
.dtbl th.r{text-align:right}
.dtbl td{padding:6px 11px;border-bottom:1px solid #F8FAFC;font-size:11px;white-space:nowrap}
.dtbl tr:hover td{background:#FAFBFF}
.dtbl tr.grp-end td{border-bottom:2px solid #E2E8F0}
.dtbl tr.total-row td{background:#F8FAFC;font-weight:700;border-top:2px solid #E2E8F0}
.r-pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 7px;border-radius:9px}
.r-dom{background:#F0FDF4;color:#15803D}
.r-dev{background:#EEF2FF;color:#4338CA}
.r-em{background:#FEFCE8;color:#A16207}
.c-pill{font-size:9px;font-weight:700;padding:1px 5px;border-radius:7px}
.c-core{background:#DBEAFE;color:#1D4ED8}
.c-sat{background:#FEF3C7;color:#92400E}
/* INPUT */
.inp-card{background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.16)}
.inp-hd{padding:10px 18px;display:flex;align-items:center;gap:10px;border-left-width:4px;border-left-style:solid}
.inp-hd-dom{background:#F0FDF4;border-color:#86EFAC}
.inp-hd-dev{background:#EEF2FF;border-color:#A5B4FC}
.inp-hd-em{background:#FEFCE8;border-color:#FDE047}
.inp-hd-r{font-size:12px;font-weight:700}
.inp-hd-r.dom{color:#15803D}
.inp-hd-r.dev{color:#4338CA}
.inp-hd-r.em{color:#A16207}
.inp-hd-t{font-size:11px;font-weight:600;color:#475569}
.itbl{width:100%;border-collapse:collapse}
.itbl th{padding:7px 12px;font-size:9px;font-weight:700;color:#94A3B8;
  background:#F8FAFC;text-align:center;border-bottom:2px solid #E2E8F0;white-space:nowrap}
.itbl th:first-child{text-align:left}
.itbl td{padding:5px 8px;border-bottom:1px solid #F1F5F9}
.itbl tr.sub td{background:#F8FAFC;font-weight:700;border-top:2px solid #E2E8F0;font-size:11px}
.ni{width:88px;padding:5px 8px;border-radius:7px;border:1px solid #E2E8F0;
  text-align:right;font-size:11px;font-weight:600;font-family:inherit;transition:border .15s}
.ni:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.ri{width:68px;padding:5px 8px;border-radius:7px;border:1px solid #E2E8F0;
  text-align:center;font-size:11px;font-family:inherit;transition:border .15s}
.ri:focus{outline:none;border-color:#7C3AED}
.inp-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.inp-sm-card{background:rgba(255,255,255,.07);border-radius:11px;padding:11px 14px}
.inp-sm-ttl{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:4px}
.inp-sm-val{font-size:17px;font-weight:800}
@media(max-width:768px){.inp-summary{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useMemo,useCallback} = React;

/* ─── マスターデータ ─── */
const ASSETS = [
  {id:"dom_sav1", name:"普通預金①",   r:"国内",   t:"現金・債券",isCore:true, defR:0.001,  sc:[100,100],fc:[10,10] },
  {id:"dom_ins1", name:"終身保険①",   r:"国内",   t:"現金・債券",isCore:true, defR:0.001,  sc:[200,200],fc:[0,0]  },
  {id:"dom_ins2", name:"終身保険②",   r:"国内",   t:"現金・債券",isCore:true, defR:0.03,   sc:[380,380],fc:[0,0]  },
  {id:"dom_med",  name:"終身医療",     r:"国内",   t:"現金・債券",isCore:true, defR:0.0001, sc:[100,100],fc:[0,0]  },
  {id:"dom_sav2", name:"普通預金②",   r:"国内",   t:"現金・債券",isCore:true, defR:0.0001, sc:[250,0],  fc:[0,0]  },
  {id:"dom_dep",  name:"定期預金",     r:"国内",   t:"現金・債券",isCore:true, defR:0.001,  sc:[100,0],  fc:[0,0]  },
  {id:"dom_stk",  name:"持ち株",       r:"国内",   t:"株式・投信",isCore:true, defR:0.06,   sc:[800,800],fc:[30,0] },
  {id:"dom_ide",  name:"iDeCo(国内)", r:"国内",   t:"株式・投信",isCore:true, defR:0.06,   sc:[150,150],fc:[0,0]  },
  {id:"dom_gld",  name:"金",           r:"国内",   t:"その他",   isCore:false,defR:0.06,   sc:[100,100],fc:[10,10]},
  {id:"dev_fins", name:"外貨建て保険", r:"先進国", t:"現金・債券",isCore:true, defR:0.025,  sc:[300,300],fc:[0,0]  },
  {id:"dev_lump", name:"一時払い外貨", r:"先進国", t:"現金・債券",isCore:true, defR:0.02,   sc:[200,200],fc:[0,0]  },
  {id:"dev_bnd",  name:"外債",         r:"先進国", t:"現金・債券",isCore:true, defR:0.03,   sc:[500,850],fc:[0,0]  },
  {id:"dev_fnd",  name:"投信(債券)",  r:"先進国", t:"現金・債券",isCore:true, defR:0.06,   sc:[80,80],  fc:[0,0]  },
  {id:"dev_dc",   name:"ＤＣ",         r:"先進国", t:"株式・投信",isCore:true, defR:0.06,   sc:[150,150],fc:[12,12]},
  {id:"dev_ide",  name:"iDeCo(先進国)",r:"先進国",t:"株式・投信",isCore:true, defR:0.07,   sc:[150,150],fc:[12,12]},
  {id:"em_eq",    name:"新興国株式",   r:"新興国", t:"株式・投信",isCore:true, defR:0.05,   sc:[0,0],    fc:[0,0]  },
  {id:"em_cry",   name:"暗号資産",     r:"新興国", t:"その他",   isCore:false,defR:0.10,   sc:[0,0],    fc:[0,0]  },
];
const REGIONS = ["国内","先進国","新興国"];
const TYPES   = ["現金・債券","株式・投信","その他"];

/* ─── 計算 ─── */
const fvCalc=(s,f,r,n)=>r===0?s+f*n:s*Math.pow(1+r,n)+f*(Math.pow(1+r,n)-1)/r;
const N=(n)=>Math.round(n).toLocaleString("ja-JP");
const N1=(n)=>n.toLocaleString("ja-JP",{minimumFractionDigits:1,maximumFractionDigits:1});
const P=(a,b)=>b>0?(a/b*100).toFixed(1):"0.0";

function initData(){
  const d={};
  ASSETS.forEach(a=>{d[a.id]={sc:a.sc[0],sa:a.sc[1],fc:a.fc[0],fa:a.fc[1],r:a.defR}});
  return d;
}

function calcPort(data,sc,years){
  let total=0,core=0,sat=0,dom=0,ovs=0,bond=0,eq=0,oth=0,flow=0,fvT=0;
  const byA=ASSETS.map(a=>{
    const d=data[a.id];
    const s=sc==="cur"?d.sc:d.sa;
    const f=sc==="cur"?d.fc:d.fa;
    const fv=fvCalc(s,f,d.r,years);
    total+=s;flow+=f;fvT+=fv;
    if(a.isCore)core+=s;else sat+=s;
    if(a.r==="国内")dom+=s;else ovs+=s;
    if(a.t==="現金・債券")bond+=s;
    else if(a.t==="株式・投信")eq+=s;
    else oth+=s;
    return{...a,stock:s,flow:f,fv,ret:d.r};
  });
  return{total,core,sat,dom,ovs,bond,eq,oth,flow,fvT,byA};
}

/* ─── SVGドーナツ ─── */
function Donut({data,colors,size=108}){
  const sw=size*0.145;
  const r=(size-sw)/2;
  const cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+Math.max(0,d.value||0),0);
  if(total===0) return(
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E2E8F0" strokeWidth={sw}/>
    </svg>
  );
  let cum=0;
  const segs=data.map((d,i)=>{
    const f=d.value/total;
    const gap=0.003;
    const dash=Math.max(0,(f-gap))*circ;
    const off=-(cum*circ)-(circ/4);
    cum+=f;
    return{dash,off,color:colors[i]||"#E2E8F0"};
  });
  return(
    <svg width={size} height={size}>
      {segs.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none"
          stroke={s.color} strokeWidth={sw}
          strokeDasharray={`${s.dash} ${circ}`}
          strokeDashoffset={s.off}/>
      ))}
    </svg>
  );
}

/* ─── SVGバーチャート ─── */
function BarChart({data,h=210}){
  const maxV=Math.max(...data.map(d=>Math.max(d.cur||0,d.aft||0)),1);
  const pl={t:14,b:28,l:52,r:12};
  const bw=32,bg=5;
  const gw=bw*2+bg+14;
  const W=data.length*gw+pl.l+pl.r;
  const H=h;
  const pH=H-pl.t-pl.b;
  const ticks=4;
  const fmtY=v=>{
    if(v>=10000)return`${(v/10000).toFixed(1)}億`;
    if(v>=1000)return`${(v/1000).toFixed(0)}千`;
    return`${Math.round(v)}`;
  };
  return(
    <div style={{width:"100%",overflowX:"auto"}}>
      <svg width={Math.max(W,360)} height={H} viewBox={`0 0 ${Math.max(W,360)} ${H}`} style={{display:"block",width:"100%",height:"auto"}}>
        {Array.from({length:ticks+1},(_,i)=>{
          const y=pl.t+(i/ticks)*pH;
          const v=maxV*(1-i/ticks);
          return(
            <g key={i}>
              <line x1={pl.l} y1={y} x2={Math.max(W,360)-pl.r} y2={y} stroke="#F1F5F9" strokeWidth="1"/>
              <text x={pl.l-5} y={y+3.5} fontSize="9" textAnchor="end" fill="#94A3B8">{fmtY(v)}</text>
            </g>
          );
        })}
        {data.map((d,i)=>{
          const gx=pl.l+i*gw+7;
          const curH=maxV>0?(d.cur/maxV)*pH:0;
          const aftH=maxV>0?(d.aft/maxV)*pH:0;
          return(
            <g key={i}>
              {curH>0&&<rect x={gx} y={pl.t+pH-curH} width={bw} height={curH} fill="#2563EB" rx="3"/>}
              {aftH>0&&<rect x={gx+bw+bg} y={pl.t+pH-aftH} width={bw} height={aftH} fill="#059669" rx="3"/>}
              <text x={gx+bw+bg/2} y={H-8} fontSize="9.5" textAnchor="middle" fill="#64748B">{d.name}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [tab,setTab]=useState("dash");
  const [years,setYears]=useState(10);
  const [data,setData]=useState(initData);
  const upd=useCallback((id,field,val)=>
    setData(p=>({...p,[id]:{...p[id],[field]:parseFloat(val)||0}})),[]);
  const cur=useMemo(()=>calcPort(data,"cur",years),[data,years]);
  const aft=useMemo(()=>calcPort(data,"aft",years),[data,years]);

  return(
    <div>
      <nav className="nav">
        <div className="nav-inner">
          <div className="logo">
            ◆ コア・サテライト<small>ポートフォリオ分析</small>
          </div>
          <div className="tabs">
            <button className={`tab ${tab==="dash"?"on":"off"}`} onClick={()=>setTab("dash")}>📊 ダッシュボード</button>
            <button className={`tab ${tab==="inp"?"on":"off"}`}  onClick={()=>setTab("inp")}>📝 資産入力</button>
          </div>
          <div className="nav-r">
            <div className="yr-ctrl">
              <label>運用年数</label>
              <input type="number" min="1" max="30" value={years}
                onChange={e=>setYears(Math.max(1,Math.min(30,parseInt(e.target.value)||10)))}/>
              <label>年</label>
            </div>
          </div>
        </div>
      </nav>
      {tab==="dash"
        ?<DashPage cur={cur} aft={aft} years={years}/>
        :<InpPage data={data} upd={upd} cur={cur} aft={aft}/>
      }
    </div>
  );
}

/* ─── DASHBOARD ─── */
function DashPage({cur,aft,years}){
  const fvD=aft.fvT-cur.fvT;
  const flD=aft.flow-cur.flow;
  const mkCore=p=>[{name:"コア",value:p.core,pct:P(p.core,p.total)},{name:"サテライト",value:p.sat,pct:P(p.sat,p.total)}];
  const mkDom =p=>[{name:"国内",value:p.dom,pct:P(p.dom,p.total)},{name:"海外",value:p.ovs,pct:P(p.ovs,p.total)}];
  const mkCls =p=>[{name:"現金・債券",value:p.bond,pct:P(p.bond,p.total)},{name:"株式・投信",value:p.eq,pct:P(p.eq,p.total)},{name:"その他",value:p.oth,pct:P(p.oth,p.total)}];
  const CCOR=["#2563EB","#F59E0B"];
  const CDOM=["#059669","#6366F1"];
  const CCLS=["#0EA5E9","#F97316","#8B5CF6"];
  const rgBar=REGIONS.map(rg=>({
    name:rg,
    cur:Math.round(cur.byA.filter(a=>a.r===rg).reduce((s,a)=>s+a.fv,0)),
    aft:Math.round(aft.byA.filter(a=>a.r===rg).reduce((s,a)=>s+a.fv,0)),
  })).filter(d=>d.cur>0||d.aft>0);
  const tyBar=TYPES.map(tp=>({
    name:tp==="現金・債券"?"債券・現金":tp,
    cur:Math.round(cur.byA.filter(a=>a.t===tp).reduce((s,a)=>s+a.fv,0)),
    aft:Math.round(aft.byA.filter(a=>a.t===tp).reduce((s,a)=>s+a.fv,0)),
  }));
  return(
    <div className="page">
      {/* インサイト */}
      <div className="sec">
        <div className="insight">
          <div style={{fontSize:26,lineHeight:1}}>💡</div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#1E40AF",marginBottom:6}}>対策のポイント</div>
            <div className="insight-pts">
              <div className="insight-pt"><span style={{fontWeight:700,color:"#1D4ED8"}}>① </span>国内低利回り預金 350万円 → 先進国外債へ移し替え（海外分散 ＋ 利回り改善）</div>
              <div className="insight-pt"><span style={{fontWeight:700,color:"#1D4ED8"}}>② </span>持ち株 年間積み立て 30万円 → 停止（集中リスク低減）</div>
              <div className="insight-pt"><span style={{fontWeight:700,color:fvD>=0?"#059669":"#DC2626"}}>→ </span>
                {years}年後の予測資産が <strong style={{fontSize:12,color:fvD>=0?"#059669":"#DC2626"}}>{N(Math.abs(fvD))}万円</strong> {fvD>=0?"増加":"減少"}</div>
            </div>
          </div>
        </div>
      </div>

      {/* KPI */}
      <div className="sec">
        <div className="sec-ttl">主要指標</div>
        <div className="g4">
          <KpiCard ac="bl" icon="💰" title="総資産（ストック）"
            curV={N(cur.total)+"万"} aftV={N(aft.total)+"万"}
            dNode={<DiffBadge v={aft.total-cur.total} unit="万"/>}/>
          <KpiCard ac="gr" icon="📈" title={`${years}年後の予測資産`}
            curV={N(cur.fvT)+"万"} aftV={N(aft.fvT)+"万"} hi
            dNode={<DiffBadge v={fvD} unit="万"/>}/>
          <KpiCard ac="am" icon="💸" title="年間フロー合計"
            curV={N(cur.flow)+"万/年"} aftV={N(aft.flow)+"万/年"}
            dNode={<DiffBadge v={flD} unit="万/年"/>}/>
          <KpiCard ac="vi" icon="🌏" title="国内 / 海外 比率"
            curV={`国内 ${P(cur.dom,cur.total)}%`} aftV={`国内 ${P(aft.dom,aft.total)}%`}
            dNode={<span className="diff-up">海外比率 {P(cur.ovs,cur.total)}% → {P(aft.ovs,aft.total)}%</span>}/>
        </div>
      </div>

      {/* ドーナツ */}
      <div className="sec">
        <div className="sec-ttl">資産配分の比較</div>
        <div className="g3">
          <DonutCard title="コア / サテライト" curD={mkCore(cur)} aftD={mkCore(aft)} colors={CCOR}/>
          <DonutCard title="国内 / 海外" curD={mkDom(cur)} aftD={mkDom(aft)} colors={CDOM}/>
          <DonutCard title="資産クラス別" curD={mkCls(cur)} aftD={mkCls(aft)} colors={CCLS}/>
        </div>
      </div>

      {/* バー */}
      <div className="sec">
        <div className="sec-ttl">{years}年後 予測資産の内訳</div>
        <div className="g2">
          <div className="card">
            <div className="card-hd">地域別（万円）</div>
            <div className="card-bd">
              <BarChart data={rgBar}/>
              <BarLegend/>
            </div>
          </div>
          <div className="card">
            <div className="card-hd">資産クラス別（万円）</div>
            <div className="card-bd">
              <BarChart data={tyBar}/>
              <BarLegend/>
            </div>
          </div>
        </div>
      </div>

      {/* 詳細テーブル */}
      <div className="sec">
        <div className="sec-ttl">資産別 詳細比較</div>
        <div className="card">
          <DetailTbl cur={cur} aft={aft} years={years}/>
        </div>
      </div>
    </div>
  );
}

/* ─── PARTS ─── */
function KpiCard({ac,icon,title,curV,aftV,hi,dNode}){
  return(
    <div className={`kpi ${ac}`}>
      <div className="kpi-ttl">{icon} {title}</div>
      <div className="kpi-vals">
        <div>
          <span className="kpi-lbl cur">現状</span>
          <div className="kpi-val">{curV}</div>
        </div>
        <div className="kpi-arr">→</div>
        <div>
          <span className="kpi-lbl aft">対策後</span>
          <div className={`kpi-val${hi?" hi":""}`}>{aftV}</div>
        </div>
      </div>
      <div className="kpi-note">{dNode}</div>
    </div>
  );
}

function DiffBadge({v,unit}){
  if(Math.abs(v)<0.5)return<span style={{color:"#94A3B8"}}>変化なし</span>;
  const cls=v>0?"diff-up":"diff-dn";
  return<span className={cls}>{v>0?"▲":"▼"} {N(Math.abs(v))}{unit}</span>;
}

function DonutCard({title,curD,aftD,colors}){
  const Legend=({data})=>(
    <div className="legend">
      {data.map((d,i)=>(
        <div key={i} className="legend-item">
          <div className="legend-dot" style={{background:colors[i%colors.length]}}/>
          <span style={{color:"#475569"}}>{d.name}</span>
          <strong style={{marginLeft:2}}>{d.pct}%</strong>
        </div>
      ))}
    </div>
  );
  return(
    <div className="card">
      <div className="card-hd">{title}</div>
      <div className="card-bd">
        <div className="donut-wrap">
          <div className="donut-half">
            <div className="donut-lbl cur">現　状</div>
            <Donut data={curD} colors={colors}/>
            <Legend data={curD}/>
          </div>
          <div className="donut-sep"/>
          <div className="donut-half">
            <div className="donut-lbl aft">対策後</div>
            <Donut data={aftD} colors={colors}/>
            <Legend data={aftD}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function BarLegend(){
  return(
    <div className="bar-legend">
      {[["現状","#2563EB"],["対策後","#059669"]].map(([n,c])=>(
        <div key={n} className="bl-item"><div className="bl-dot" style={{background:c}}/>{n}</div>
      ))}
    </div>
  );
}

function DetailTbl({cur,aft,years}){
  const rows=ASSETS.map((a,i)=>{
    const ca=cur.byA[i];
    const aa=aft.byA[i];
    return{...a,...ca,sA:aa.stock,fA:aa.flow,fvA:aa.fv};
  }).filter(r=>r.stock>0||r.sA>0||r.flow>0||r.fA>0);

  const rCls=r=>r==="国内"?"r-dom":r==="先進国"?"r-dev":"r-em";
  let prev=null;
  const trs=[];
  rows.forEach((row,i)=>{
    const newR=row.r!==prev;
    if(newR)prev=row.r;
    const isLast=i===rows.length-1||rows[i+1].r!==row.r;
    const fvD=row.fvA-row.fv;
    trs.push(
      <tr key={row.id} className={isLast?"grp-end":""}>
        <td>{newR?<span className={`r-pill ${rCls(row.r)}`}>{row.r}</span>:<span style={{color:"#E2E8F0"}}>│</span>}</td>
        <td style={{color:"#94A3B8",fontSize:10}}>{row.t}</td>
        <td><span style={{fontWeight:600,color:"#334155"}}>{row.name}</span>{" "}<span className={`c-pill ${row.isCore?"c-core":"c-sat"}`}>{row.isCore?"コア":"衛星"}</span></td>
        <td style={{textAlign:"right",fontWeight:700}}>{N(row.stock)}万</td>
        <td style={{textAlign:"right",color:row.flow>0?"#2563EB":"#CBD5E1"}}>{row.flow>0?N(row.flow)+"万":"—"}</td>
        <td style={{textAlign:"right",fontWeight:700,color:row.sA!==row.stock?"#059669":"#1E293B"}}>{N(row.sA)}万{row.sA!==row.stock&&<span style={{fontSize:8,marginLeft:2,color:"#059669"}}>変更</span>}</td>
        <td style={{textAlign:"right",color:row.fA>0?"#059669":row.flow>0?"#DC2626":"#CBD5E1"}}>{row.fA>0?N(row.fA)+"万":row.flow>0?<span style={{color:"#DC2626"}}>停止</span>:"—"}</td>
        <td style={{textAlign:"right",color:"#94A3B8"}}>{(row.ret*100).toFixed(1)}%</td>
        <td style={{textAlign:"right",color:"#475569"}}>{N(row.fv)}万</td>
        <td style={{textAlign:"right",fontWeight:700}}>{N(row.fvA)}万</td>
        <td style={{textAlign:"right"}}><DiffBadge v={fvD} unit="万"/></td>
      </tr>
    );
  });
  trs.push(
    <tr key="tot" className="total-row">
      <td colSpan={3} style={{paddingLeft:14,color:"#64748B"}}>合　計</td>
      <td style={{textAlign:"right",color:"#2563EB",fontSize:12}}>{N(cur.total)}万</td>
      <td style={{textAlign:"right",color:"#2563EB",fontSize:11}}>{N(cur.flow)}万/年</td>
      <td style={{textAlign:"right",color:"#059669",fontSize:12}}>{N(aft.total)}万</td>
      <td style={{textAlign:"right",color:"#059669",fontSize:11}}>{N(aft.flow)}万/年</td>
      <td/>
      <td style={{textAlign:"right",color:"#2563EB",fontWeight:800,fontSize:12}}>{N(cur.fvT)}万</td>
      <td style={{textAlign:"right",color:"#059669",fontWeight:800,fontSize:12}}>{N(aft.fvT)}万</td>
      <td style={{textAlign:"right"}}><DiffBadge v={aft.fvT-cur.fvT} unit="万"/></td>
    </tr>
  );
  return(
    <div className="tbl-scroll">
      <table className="dtbl">
        <thead><tr>
          <th>地域</th><th>種別</th><th>資産名</th>
          <th className="r">現状 残高</th><th className="r">現状 フロー/年</th>
          <th className="r">対策後 残高</th><th className="r">対策後 フロー/年</th>
          <th className="r">利回り</th>
          <th className="r">{years}年後(現状)</th>
          <th className="r">{years}年後(対策後)</th>
          <th className="r">差額</th>
        </tr></thead>
        <tbody>{trs}</tbody>
      </table>
    </div>
  );
}

/* ─── INPUT PAGE ─── */
function InpPage({data,upd,cur,aft}){
  const groups=useMemo(()=>{
    const g=[];
    REGIONS.forEach(rg=>{
      TYPES.forEach(tp=>{
        const items=ASSETS.filter(a=>a.r===rg&&a.t===tp);
        if(items.length)g.push({rg,tp,items});
      });
    });
    return g;
  },[]);
  const hdCls=r=>r==="国内"?"inp-hd-dom":r==="先進国"?"inp-hd-dev":"inp-hd-em";
  const rCls=r=>r==="国内"?"dom":r==="先進国"?"dev":"em";
  const typeIc=t=>t==="現金・債券"?"🏦":t==="株式・投信"?"📈":"💎";
  return(
    <div className="page">
      <div className="inp-summary">
        {[["💰 現状 総資産",N(cur.total)+"万","#60A5FA"],
          ["💸 現状 フロー",N(cur.flow)+"万/年","#60A5FA"],
          ["💰 対策後 総資産",N(aft.total)+"万","#34D399"],
          ["💸 対策後 フロー",N(aft.flow)+"万/年","#34D399"]].map(([t,v,c])=>(
          <div key={t} className="inp-sm-card">
            <div className="inp-sm-ttl">{t}</div>
            <div className="inp-sm-val" style={{color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(59,130,246,.09)",border:"1px solid rgba(59,130,246,.2)",borderRadius:10,padding:"9px 14px",marginBottom:14,fontSize:11,color:"rgba(255,255,255,.65)",lineHeight:1.8}}>
        💡 <strong style={{color:"rgba(255,255,255,.9)"}}>入力ガイド：</strong>　残高 ＝ 現在の保有額（万円）　／　フロー ＝ 年間積み立て・配当（万円/年）　／　利回り ＝ 年率小数（6%なら 0.06）
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        {groups.map(({rg,tp,items})=>{
          const scT=items.reduce((s,a)=>s+data[a.id].sc,0);
          const fcT=items.reduce((s,a)=>s+data[a.id].fc,0);
          const saT=items.reduce((s,a)=>s+data[a.id].sa,0);
          const faT=items.reduce((s,a)=>s+data[a.id].fa,0);
          return(
            <div key={`${rg}_${tp}`} className="inp-card">
              <div className={`inp-hd ${hdCls(rg)}`}>
                <span className={`inp-hd-r ${rCls(rg)}`}>{rg}</span>
                <span style={{color:"#94A3B8"}}>›</span>
                <span className="inp-hd-t">{typeIc(tp)} {tp}</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table className="itbl">
                  <thead><tr>
                    <th>資産名</th>
                    <th style={{background:"#EFF6FF",color:"#1D4ED8"}}>現状 残高（万）</th>
                    <th style={{background:"#EFF6FF",color:"#1D4ED8"}}>現状 フロー（万/年）</th>
                    <th style={{background:"#F0FDF4",color:"#065F46"}}>対策後 残高（万）</th>
                    <th style={{background:"#F0FDF4",color:"#065F46"}}>対策後 フロー（万/年）</th>
                    <th style={{color:"#7C3AED"}}>利回り（年率）</th>
                  </tr></thead>
                  <tbody>
                    {items.map(a=>{
                      const d=data[a.id];
                      return(
                        <tr key={a.id}>
                          <td style={{padding:"7px 14px"}}>
                            <span className={`c-pill ${a.isCore?"c-core":"c-sat"}`}>{a.isCore?"コア":"衛星"}</span>
                            {" "}<span style={{fontSize:12,fontWeight:600,color:"#334155"}}>{a.name}</span>
                          </td>
                          <td style={{background:"rgba(239,246,255,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="10" value={d.sc}
                              onChange={e=>upd(a.id,"sc",e.target.value)} style={{color:"#1D4ED8"}}/>
                          </td>
                          <td style={{background:"rgba(239,246,255,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="1" value={d.fc}
                              onChange={e=>upd(a.id,"fc",e.target.value)} style={{color:"#1D4ED8"}}/>
                          </td>
                          <td style={{background:"rgba(240,253,244,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="10" value={d.sa}
                              onChange={e=>upd(a.id,"sa",e.target.value)} style={{color:"#059669"}}/>
                          </td>
                          <td style={{background:"rgba(240,253,244,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="1" value={d.fa}
                              onChange={e=>upd(a.id,"fa",e.target.value)} style={{color:"#059669"}}/>
                          </td>
                          <td style={{textAlign:"center"}}>
                            <input className="ri" type="number" min="0" max="1" step="0.001" value={d.r}
                              onChange={e=>upd(a.id,"r",e.target.value)} style={{color:"#7C3AED"}}/>
                            <span style={{fontSize:9,color:"#94A3B8",marginLeft:3}}>({(d.r*100).toFixed(1)}%)</span>
                          </td>
                        </tr>
                      );
                    })}
                    <tr className="sub">
                      <td style={{paddingLeft:14,color:"#64748B",fontSize:11}}>小　計</td>
                      <td style={{textAlign:"center",color:"#1D4ED8"}}>{N(scT)}万</td>
                      <td style={{textAlign:"center",color:"#1D4ED8"}}>{N(fcT)}万</td>
                      <td style={{textAlign:"center",color:"#059669"}}>{N(saT)}万</td>
                      <td style={{textAlign:"center",color:"#059669"}}>{N(faT)}万</td>
                      <td/>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
