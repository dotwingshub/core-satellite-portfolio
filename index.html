<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ポートフォリオ分析</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:#0E1929;min-height:100vh;color:#1E293B}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,18,35,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
.nav-inner{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:12px;height:52px}
.logo{font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.tabs{display:flex;gap:3px}
.tab{padding:5px 14px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .15s}
.tab.on{background:#2563EB;color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.4)}
.tab.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
.tab.off:hover{background:rgba(255,255,255,.13);color:#fff}
.yr-ctrl{margin-left:auto;display:flex;align-items:center;gap:6px}
.yr-ctrl label{font-size:11px;color:rgba(255,255,255,.45)}
.yr-ctrl input{width:48px;padding:3px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.09);color:#fff;text-align:center;font-size:14px;font-weight:700;font-family:inherit}
.yr-ctrl input:focus{outline:none;border-color:#2563EB}

/* PAGE */
.page{max-width:1440px;margin:0 auto;padding:20px}

/* CARD */
.card{background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);overflow:hidden}
.card-hd{padding:10px 14px 8px;font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.06em;border-bottom:1px solid #F1F5F9}
.card-bd{padding:14px}

/* SEGMENT BUTTONS */
.seg-btn{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.seg-btn button{padding:6px 14px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;transition:all .15s}
.seg-btn button.on{background:#2563EB;color:#fff}
.seg-btn button.on.gr{background:#059669}
.seg-btn button.off{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.seg-btn button.off:hover{color:#fff;background:rgba(255,255,255,.12)}

/* MATRIX */
.mtbl{width:100%;border-collapse:collapse;min-width:600px}
.mtbl th,.mtbl td{padding:8px 12px}
.mtbl th:first-child,.mtbl td:first-child{text-align:left}
.mtbl th{background:#F8FAFC;font-size:10px;font-weight:700;color:#64748B;border-bottom:2px solid #E2E8F0;text-align:right}
.mtbl td{border-bottom:1px solid #F1F5F9;font-size:12px;text-align:right;vertical-align:middle}
.mtbl tbody tr:hover td{background:#FAFBFF;cursor:pointer}
.mtbl .grp-end td{border-bottom:2px solid #E2E8F0}
.mtbl .tot-row td{background:#F1F5F9;font-weight:700;border-top:2px solid #E2E8F0}
.r-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.r-dom{background:#DCFCE7;color:#15803D}
.r-dev{background:#EEF2FF;color:#4338CA}
.r-em{background:#FEF9C3;color:#A16207}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border-radius:12px;padding:14px 16px 12px;box-shadow:0 3px 16px rgba(0,0,0,.18);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.bl::before{background:linear-gradient(90deg,#2563EB,#60A5FA)}
.kpi.gr::before{background:linear-gradient(90deg,#059669,#34D399)}
.kpi.am::before{background:linear-gradient(90deg,#D97706,#FCD34D)}
.kpi.vi::before{background:linear-gradient(90deg,#7C3AED,#A78BFA)}
.kpi-ttl{font-size:9px;font-weight:700;color:#94A3B8;letter-spacing:.04em;margin-bottom:8px}
.kpi-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.kpi-lbl{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px}
.kpi-lbl.c{background:#EFF6FF;color:#1D4ED8}
.kpi-lbl.a{background:#F0FDF4;color:#065F46}
.kpi-val{font-size:15px;font-weight:800;color:#1E293B;margin-top:2px}
.kpi-val.hi{color:#059669}
.kpi-arr{color:#CBD5E1;font-size:14px}
.kpi-note{font-size:10px;color:#94A3B8}
.diff-up{color:#059669;font-weight:700}
.diff-dn{color:#DC2626;font-weight:700}

/* DONUTS */
.donut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
@media(max-width:900px){.donut-grid{grid-template-columns:1fr}}
.donut-wrap{display:flex;gap:0;justify-content:space-around}
.donut-half{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;gap:4px}
.donut-lbl{font-size:9px;font-weight:700;letter-spacing:.06em}
.donut-lbl.c{color:#2563EB}
.donut-lbl.a{color:#059669}
.donut-sep{width:1px;background:#F1F5F9;margin:4px 0}
.legend{display:flex;flex-wrap:wrap;gap:3px 8px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.bar-legend{display:flex;justify-content:center;gap:14px;margin-top:6px}
.bl-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#64748B}
.bl-dot{width:8px;height:8px;border-radius:2px}

/* INPUT */
.inp-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:768px){.inp-summary{grid-template-columns:repeat(2,1fr)}}
.inp-sm{background:rgba(255,255,255,.07);border-radius:10px;padding:10px 14px}
.inp-sm-t{font-size:9px;color:rgba(255,255,255,.4);margin-bottom:3px}
.inp-sm-v{font-size:16px;font-weight:800}
.inp-section{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,.18);margin-bottom:10px}
.inp-hd{padding:9px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.inp-hd-dom{background:#F0FDF4;border-left:4px solid #86EFAC}
.inp-hd-dev{background:#EEF2FF;border-left:4px solid #A5B4FC}
.inp-hd-em{background:#FEFCE8;border-left:4px solid #FDE047}
.inp-hd-r{font-size:12px;font-weight:700}
.inp-hd-r.dom{color:#15803D}
.inp-hd-r.dev{color:#4338CA}
.inp-hd-r.em{color:#A16207}
.inp-hd-t{font-size:11px;color:#475569;font-weight:600}
.inp-hd-arrow{margin-left:auto;color:#94A3B8;font-size:11px}
.itbl{width:100%;border-collapse:collapse}
.itbl th{padding:6px 8px;font-size:9px;font-weight:700;color:#94A3B8;background:#F8FAFC;border-bottom:2px solid #E2E8F0;text-align:center;white-space:nowrap}
.itbl th:first-child{text-align:left}
.itbl td{padding:4px 6px;border-bottom:1px solid #F1F5F9}
.itbl tr.sub td{background:#F8FAFC;font-weight:700;border-top:2px solid #E2E8F0;font-size:11px}
.ni{width:82px;padding:4px 6px;border-radius:6px;border:1px solid #E2E8F0;text-align:right;font-size:11px;font-weight:600;font-family:inherit}
.ni:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.ri{width:62px;padding:4px 6px;border-radius:6px;border:1px solid #E2E8F0;text-align:center;font-size:11px;font-family:inherit}
.ri:focus{outline:none;border-color:#7C3AED}
.ni-name{padding:4px 8px;border-radius:6px;border:1px solid #E2E8F0;font-size:11px;font-family:inherit;width:120px}
.ni-name:focus{outline:none;border-color:#2563EB}
.btn-del{padding:2px 8px;border-radius:5px;border:1px solid #FCA5A5;background:#FEF2F2;color:#DC2626;cursor:pointer;font-size:10px;font-family:inherit}
.btn-add{padding:5px 14px;border-radius:7px;border:1px dashed #93C5FD;background:#EFF6FF;color:#2563EB;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;margin:8px 12px;display:inline-block}

/* DETAIL TABLE */
.dtbl{width:100%;border-collapse:collapse;min-width:800px}
.dtbl th{padding:6px 10px;font-size:9px;font-weight:700;color:#94A3B8;background:#F8FAFC;white-space:nowrap;border-bottom:2px solid #E2E8F0}
.dtbl th.r{text-align:right}
.dtbl td{padding:5px 10px;border-bottom:1px solid #F8FAFC;font-size:11px;white-space:nowrap}
.dtbl tr:hover td{background:#FAFBFF}
.dtbl tr.grp-end td{border-bottom:2px solid #E2E8F0}
.dtbl tr.tot-row td{background:#F8FAFC;font-weight:700;border-top:2px solid #E2E8F0}
.c-pill{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px}
.c-core{background:#DBEAFE;color:#1D4ED8}
.c-sat{background:#FEF3C7;color:#92400E}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.sec-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-ttl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.mb14{margin-bottom:14px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback} = React;

const REGIONS = ["国内","先進国","新興国"];
const TYPES   = ["現金・債券","株式・投信","その他"];

let _uid = 100;
const uid = () => `a${_uid++}`;

const INIT = [
  {id:"dom_sav1",name:"普通預金①",   region:"国内",  type:"現金・債券",isCore:true, ret:0.001, sc:100,fc:10,sa:100,fa:10},
  {id:"dom_ins1",name:"終身保険①",   region:"国内",  type:"現金・債券",isCore:true, ret:0.001, sc:200,fc:0, sa:200,fa:0 },
  {id:"dom_ins2",name:"終身保険②",   region:"国内",  type:"現金・債券",isCore:true, ret:0.03,  sc:380,fc:0, sa:380,fa:0 },
  {id:"dom_med", name:"終身医療",     region:"国内",  type:"現金・債券",isCore:true, ret:0.0001,sc:100,fc:0, sa:100,fa:0 },
  {id:"dom_sav2",name:"普通預金②",   region:"国内",  type:"現金・債券",isCore:true, ret:0.0001,sc:250,fc:0, sa:0,  fa:0 },
  {id:"dom_dep", name:"定期預金",     region:"国内",  type:"現金・債券",isCore:true, ret:0.001, sc:100,fc:0, sa:0,  fa:0 },
  {id:"dom_stk", name:"持ち株",       region:"国内",  type:"株式・投信",isCore:true, ret:0.06,  sc:800,fc:30,sa:800,fa:0 },
  {id:"dom_ide", name:"iDeCo(国内)", region:"国内",  type:"株式・投信",isCore:true, ret:0.06,  sc:150,fc:0, sa:150,fa:0 },
  {id:"dom_gld", name:"金",           region:"国内",  type:"その他",    isCore:false,ret:0.06,  sc:100,fc:10,sa:100,fa:10},
  {id:"dev_fins",name:"外貨建て保険", region:"先進国",type:"現金・債券",isCore:true, ret:0.025, sc:300,fc:0, sa:300,fa:0 },
  {id:"dev_lump",name:"一時払い外貨", region:"先進国",type:"現金・債券",isCore:true, ret:0.02,  sc:200,fc:0, sa:200,fa:0 },
  {id:"dev_bnd", name:"外債",         region:"先進国",type:"現金・債券",isCore:true, ret:0.03,  sc:500,fc:0, sa:850,fa:0 },
  {id:"dev_fnd", name:"投信(債券)",   region:"先進国",type:"現金・債券",isCore:true, ret:0.06,  sc:80, fc:0, sa:80, fa:0 },
  {id:"dev_dc",  name:"ＤＣ",         region:"先進国",type:"株式・投信",isCore:true, ret:0.06,  sc:150,fc:12,sa:150,fa:12},
  {id:"dev_ide", name:"iDeCo(先進国)",region:"先進国",type:"株式・投信",isCore:true, ret:0.07,  sc:150,fc:12,sa:150,fa:12},
  {id:"em_eq",   name:"新興国株式",   region:"新興国",type:"株式・投信",isCore:true, ret:0.05,  sc:0,  fc:0, sa:0,  fa:0 },
  {id:"em_cry",  name:"暗号資産",     region:"新興国",type:"その他",    isCore:false,ret:0.10,  sc:0,  fc:0, sa:0,  fa:0 },
];

const fvCalc=(s,f,r,n)=>r===0?s+f*n:s*Math.pow(1+r,n)+f*(Math.pow(1+r,n)-1)/r;
const N=v=>Math.round(v).toLocaleString("ja-JP");
const P=(a,b)=>b>0?(a/b*100).toFixed(1):"0.0";

/* ─── SVG Donut ─── */
function Donut({data,colors,size=108}){
  const sw=size*0.145, r=(size-sw)/2, cx=size/2, cy=size/2;
  const total=data.reduce((s,d)=>s+Math.max(0,d.value||0),0);
  if(total===0) return <svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#E2E8F0" strokeWidth={sw}/></svg>;
  const GAP=1.5;
  const toXY=deg=>{const rad=(deg-90)*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];};
  let ang=0;
  const segs=data.map((d,i)=>{
    const deg=d.value/total*360, s=ang+GAP/2, e=ang+deg-GAP/2;
    ang+=deg;
    if(e<=s) return null;
    const[x1,y1]=toXY(s),[x2,y2]=toXY(e);
    return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${(e-s)>180?1:0} 1 ${x2} ${y2}`}
      fill="none" stroke={colors[i%colors.length]} strokeWidth={sw} strokeLinecap="butt"/>;
  }).filter(Boolean);
  return <svg width={size} height={size}>{segs}</svg>;
}

/* ─── SVG Bar Chart ─── */
function BarChart({data,h=190}){
  const maxV=Math.max(...data.map(d=>Math.max(d.cur||0,d.aft||0)),1);
  const pl={t:12,b:26,l:50,r:10};
  const bw=28,bg=5,gw=bw*2+bg+12;
  const W=data.length*gw+pl.l+pl.r, pH=h-pl.t-pl.b, ticks=4;
  const fmtY=v=>v>=10000?`${(v/10000).toFixed(1)}億`:v>=1000?`${Math.round(v/1000)}千`:`${Math.round(v)}`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={Math.max(W,300)} height={h} viewBox={`0 0 ${Math.max(W,300)} ${h}`} style={{display:"block",width:"100%",height:"auto"}}>
        {Array.from({length:ticks+1},(_,i)=>{
          const y=pl.t+(i/ticks)*pH, v=maxV*(1-i/ticks);
          return <g key={i}><line x1={pl.l} y1={y} x2={Math.max(W,300)-pl.r} y2={y} stroke="#F1F5F9" strokeWidth="1"/>
            <text x={pl.l-4} y={y+3.5} fontSize="8.5" textAnchor="end" fill="#94A3B8">{fmtY(v)}</text></g>;
        })}
        {data.map((d,i)=>{
          const gx=pl.l+i*gw+6;
          const cH=maxV>0?(d.cur/maxV)*pH:0, aH=maxV>0?(d.aft/maxV)*pH:0;
          return <g key={i}>
            {cH>0&&<rect x={gx} y={pl.t+pH-cH} width={bw} height={cH} fill="#2563EB" rx="3"/>}
            {aH>0&&<rect x={gx+bw+bg} y={pl.t+pH-aH} width={bw} height={aH} fill="#059669" rx="3"/>}
            <text x={gx+bw+bg/2} y={h-8} fontSize="9" textAnchor="middle" fill="#64748B">{d.name}</text>
          </g>;
        })}
      </svg>
    </div>
  );
}

function BarLegend(){
  return <div className="bar-legend">
    {[["現状","#2563EB"],["対策後","#059669"]].map(([n,c])=>(
      <div key={n} className="bl-item"><div className="bl-dot" style={{background:c}}/>{n}</div>
    ))}
  </div>;
}

/* ─── Nav ─── */
function Nav({tab,setTab,years,setYears}){
  return(
    <nav className="nav">
      <div className="nav-inner">
        <div className="logo">◆ ポートフォリオ分析</div>
        <div className="tabs">
          {[["matrix","📊 マトリックス"],["input","📝 資産管理"],["compare","📈 比較分析"]].map(([k,l])=>(
            <button key={k} className={`tab ${tab===k?"on":"off"}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
        <div className="yr-ctrl">
          <label>運用年数</label>
          <input type="number" min="1" max="30" value={years}
            onChange={e=>setYears(Math.max(1,Math.min(30,parseInt(e.target.value)||10)))}/>
          <label>年</label>
        </div>
      </div>
    </nav>
  );
}

/* ─── Matrix Page ─── */
function MatrixPage({assets,cellData,totals,years,scenario,setScenario,metric,setMetric}){
  const [sel,setSel]=useState(null);

  const getVal=(key,sc,mt)=>{
    const d=cellData[key];
    if(!d) return 0;
    if(sc==="cur") return mt==="stock"?d.sc:mt==="flow"?d.fc:d.fvc;
    return mt==="stock"?d.sa:mt==="flow"?d.fa:d.fva;
  };
  const grandTotal=scenario==="cur"
    ?(metric==="stock"?totals.sc:metric==="flow"?totals.fc:totals.fvc)
    :(metric==="stock"?totals.sa:metric==="flow"?totals.fa:totals.fva);
  const colTotal=(type)=>REGIONS.reduce((s,r)=>s+getVal(`${r}__${type}`,scenario,metric),0);
  const rowTotal=(region)=>TYPES.reduce((s,t)=>s+getVal(`${region}__${t}`,scenario,metric),0);
  const unit=metric==="flow"?"万/年":"万";

  const rCls=r=>r==="国内"?"dom":r==="先進国"?"dev":"em";
  const selItems=sel?cellData[sel]?.items:[];

  const CCOR=["#2563EB","#F59E0B"];
  const CDOM=["#059669","#6366F1"];
  const CCLS=["#0EA5E9","#F97316","#8B5CF6"];
  const mkDonut=(sc)=>{
    const tot=sc==="cur"?totals.sc:totals.sa;
    const pick=a=>sc==="cur"?a.sc:a.sa;
    const core=assets.reduce((s,a)=>a.isCore?s+pick(a):s,0);
    const dom =assets.reduce((s,a)=>a.region==="国内"?s+pick(a):s,0);
    const bond=assets.reduce((s,a)=>a.type==="現金・債券"?s+pick(a):s,0);
    const eq  =assets.reduce((s,a)=>a.type==="株式・投信"?s+pick(a):s,0);
    return{
      cor:[{name:"コア",value:core,pct:P(core,tot)},{name:"サテライト",value:tot-core,pct:P(tot-core,tot)}],
      dom:[{name:"国内",value:dom,pct:P(dom,tot)},{name:"海外",value:tot-dom,pct:P(tot-dom,tot)}],
      cls:[{name:"現金・債券",value:bond,pct:P(bond,tot)},{name:"株式・投信",value:eq,pct:P(eq,tot)},{name:"その他",value:tot-bond-eq,pct:P(tot-bond-eq,tot)}],
    };
  };
  const dd=mkDonut(scenario);
  const rgBar=REGIONS.map(rg=>({name:rg,cur:Math.round(TYPES.reduce((s,t)=>s+(cellData[`${rg}__${t}`]?.fvc||0),0)),aft:Math.round(TYPES.reduce((s,t)=>s+(cellData[`${rg}__${t}`]?.fva||0),0))})).filter(d=>d.cur>0||d.aft>0);
  const tyBar=TYPES.map(tp=>({name:tp==="現金・債券"?"債券":tp==="株式・投信"?"株式・投信":tp,cur:Math.round(REGIONS.reduce((s,r)=>s+(cellData[`${r}__${tp}`]?.fvc||0),0)),aft:Math.round(REGIONS.reduce((s,r)=>s+(cellData[`${r}__${tp}`]?.fva||0),0))}));

  const LegendComp=({data,colors})=>(
    <div className="legend">
      {data.map((d,i)=>(
        <div key={i} className="legend-item">
          <div className="legend-dot" style={{background:colors[i%colors.length]}}/>
          <span style={{color:"#475569"}}>{d.name}</span>
          <strong style={{marginLeft:2}}>{d.pct}%</strong>
        </div>
      ))}
    </div>
  );

  return(
    <div className="page">
      {/* Controls */}
      <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
        <div className="seg-btn">
          {[["cur","現状"],["aft","対策後"]].map(([k,l])=>(
            <button key={k} className={scenario===k?(k==="aft"?"on gr":"on"):"off"} onClick={()=>setScenario(k)}>{l}</button>
          ))}
        </div>
        <div className="seg-btn">
          {[["stock","ストック"],["flow","フロー"],["fv",`${years}年後`]].map(([k,l])=>(
            <button key={k} className={metric===k?"on":"off"} onClick={()=>setMetric(k)}>{l}</button>
          ))}
        </div>
        <span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>
          セルをクリックすると内訳を表示
        </span>
      </div>

      {/* 3×3 Matrix */}
      <div className="card mb14">
        <div style={{overflowX:"auto"}}>
          <table className="mtbl">
            <thead>
              <tr>
                <th style={{textAlign:"left"}}>地域</th>
                {TYPES.map(t=><th key={t}>{t}</th>)}
                <th>合　計</th>
              </tr>
            </thead>
            <tbody>
              {REGIONS.map((region,ri)=>{
                const rt=rowTotal(region);
                return(
                  <tr key={region} className={ri===REGIONS.length-1?"":"grp-end"}>
                    <td style={{textAlign:"left"}}>
                      <span className={`r-tag r-${rCls(region)}`}>{region}</span>
                    </td>
                    {TYPES.map(type=>{
                      const key=`${region}__${type}`;
                      const val=getVal(key,scenario,metric);
                      const isSel=sel===key;
                      return(
                        <td key={type}
                          onClick={()=>setSel(sel===key?null:key)}
                          style={{background:isSel?"#EFF6FF":undefined,outline:isSel?"2px inset #BFDBFE":undefined}}>
                          {val>0?(
                            <>
                              <div style={{fontSize:13,fontWeight:800,color:"#1E293B"}}>{N(val)}{unit}</div>
                              {metric!=="flow"&&<div style={{fontSize:10,color:"#94A3B8"}}>{P(val,grandTotal)}%</div>}
                            </>
                          ):<span style={{color:"#CBD5E1",fontSize:11}}>—</span>}
                        </td>
                      );
                    })}
                    <td>
                      {rt>0?(
                        <>
                          <div style={{fontSize:13,fontWeight:800,color:"#334155"}}>{N(rt)}{unit}</div>
                          {metric!=="flow"&&<div style={{fontSize:10,color:"#94A3B8"}}>{P(rt,grandTotal)}%</div>}
                        </>
                      ):<span style={{color:"#CBD5E1",fontSize:11}}>—</span>}
                    </td>
                  </tr>
                );
              })}
              <tr className="tot-row">
                <td style={{textAlign:"left",fontSize:11,color:"#64748B"}}>合　計</td>
                {TYPES.map(t=>{
                  const v=colTotal(t);
                  return(
                    <td key={t}>
                      <div style={{fontSize:13,fontWeight:800,color:"#1E293B"}}>{N(v)}{unit}</div>
                      {metric!=="flow"&&<div style={{fontSize:10,color:"#94A3B8"}}>{P(v,grandTotal)}%</div>}
                    </td>
                  );
                })}
                <td>
                  <div style={{fontSize:14,fontWeight:800,color:"#2563EB"}}>{N(grandTotal)}{unit}</div>
                  {metric!=="flow"&&<div style={{fontSize:10,color:"#94A3B8"}}>100%</div>}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Selected cell detail */}
      {sel&&selItems&&selItems.length>0&&(
        <div className="card mb14">
          <div className="card-hd">{sel.replace("__"," × ")} の内訳</div>
          <div style={{overflowX:"auto"}}>
            <table className="dtbl" style={{minWidth:600}}>
              <thead><tr>
                <th>資産名</th>
                <th className="r">残高(現状)</th><th className="r">フロー(現状)</th>
                <th className="r">残高(対策後)</th><th className="r">フロー(対策後)</th>
                <th className="r">利回り</th>
                <th className="r">{years}年後(現状)</th>
                <th className="r">{years}年後(対策後)</th>
              </tr></thead>
              <tbody>
                {selItems.map(a=>(
                  <tr key={a.id}>
                    <td style={{fontWeight:600,color:"#334155"}}>
                      <span className={`c-pill ${a.isCore?"c-core":"c-sat"}`}>{a.isCore?"コア":"衛星"}</span>
                      {" "}{a.name}
                    </td>
                    <td style={{textAlign:"right",fontWeight:700}}>{N(a.sc)}万</td>
                    <td style={{textAlign:"right",color:a.fc>0?"#2563EB":"#CBD5E1"}}>{a.fc>0?N(a.fc)+"万/年":"—"}</td>
                    <td style={{textAlign:"right",fontWeight:700,color:a.sa!==a.sc?"#059669":"#1E293B"}}>{N(a.sa)}万</td>
                    <td style={{textAlign:"right",color:a.fa>0?"#059669":"#CBD5E1"}}>{a.fa>0?N(a.fa)+"万/年":"—"}</td>
                    <td style={{textAlign:"right",color:"#7C3AED"}}>{(a.ret*100).toFixed(1)}%</td>
                    <td style={{textAlign:"right"}}>{N(fvCalc(a.sc,a.fc,a.ret,years))}万</td>
                    <td style={{textAlign:"right",fontWeight:700,color:"#059669"}}>{N(fvCalc(a.sa,a.fa,a.ret,years))}万</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Donut charts */}
      <div className="sec-ttl">資産配分（{scenario==="cur"?"現状":"対策後"}・ストックベース）</div>
      <div className="donut-grid">
        {[
          {title:"コア / サテライト", d:dd.cor, colors:CCOR},
          {title:"国内 / 海外",       d:dd.dom, colors:CDOM},
          {title:"資産クラス別",      d:dd.cls, colors:CCLS},
        ].map(({title,d,colors})=>(
          <div key={title} className="card">
            <div className="card-hd">{title}</div>
            <div className="card-bd" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <Donut data={d} colors={colors} size={120}/>
              <LegendComp data={d} colors={colors}/>
            </div>
          </div>
        ))}
      </div>

      {/* Bar charts */}
      <div className="sec-ttl">{years}年後 予測資産（現状 vs 対策後）</div>
      <div className="g2">
        <div className="card">
          <div className="card-hd">地域別（万円）</div>
          <div className="card-bd"><BarChart data={rgBar}/><BarLegend/></div>
        </div>
        <div className="card">
          <div className="card-hd">資産クラス別（万円）</div>
          <div className="card-bd"><BarChart data={tyBar}/><BarLegend/></div>
        </div>
      </div>
    </div>
  );
}

/* ─── Input Page ─── */
function InputPage({assets,updAsset,addAsset,delAsset,cellData,totals}){
  const initOpen=()=>{const d={};REGIONS.forEach(r=>TYPES.forEach(t=>{d[`${r}__${t}`]=true;}));return d;};
  const [open,setOpen]=useState(initOpen);
  const toggle=k=>setOpen(p=>({...p,[k]:!p[k]}));
  const hdCls=r=>r==="国内"?"inp-hd-dom":r==="先進国"?"inp-hd-dev":"inp-hd-em";
  const rCls=r=>r==="国内"?"dom":r==="先進国"?"dev":"em";
  const typeIc=t=>t==="現金・債券"?"🏦":t==="株式・投信"?"📈":"💎";

  return(
    <div className="page">
      {/* Summary */}
      <div className="inp-summary">
        {[
          ["💰 現状 総資産",N(totals.sc)+"万","#60A5FA"],
          ["💸 現状 年間フロー",N(totals.fc)+"万/年","#60A5FA"],
          ["💰 対策後 総資産",N(totals.sa)+"万","#34D399"],
          ["💸 対策後 年間フロー",N(totals.fa)+"万/年","#34D399"],
        ].map(([t,v,c])=>(
          <div key={t} className="inp-sm">
            <div className="inp-sm-t">{t}</div>
            <div className="inp-sm-v" style={{color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(59,130,246,.09)",border:"1px solid rgba(59,130,246,.2)",borderRadius:10,padding:"8px 14px",marginBottom:14,fontSize:11,color:"rgba(255,255,255,.6)",lineHeight:1.8}}>
        💡 <strong style={{color:"rgba(255,255,255,.85)"}}>入力ガイド：</strong>残高・フローは万円単位 ／ 利回りは年率小数（6%なら 0.06）
      </div>

      {/* Sections */}
      {REGIONS.flatMap(rg=>TYPES.map(tp=>{
        const key=`${rg}__${tp}`;
        const items=(cellData[key]?.items)||[];
        const isOpen=open[key];
        const scT=items.reduce((s,a)=>s+a.sc,0);
        const fcT=items.reduce((s,a)=>s+a.fc,0);
        const saT=items.reduce((s,a)=>s+a.sa,0);
        const faT=items.reduce((s,a)=>s+a.fa,0);
        return(
          <div key={key} className="inp-section">
            <div className={`inp-hd ${hdCls(rg)}`} onClick={()=>toggle(key)}>
              <span className={`inp-hd-r ${rCls(rg)}`}>{rg}</span>
              <span style={{color:"#94A3B8",fontSize:12}}>›</span>
              <span className="inp-hd-t">{typeIc(tp)} {tp}</span>
              <span style={{marginLeft:8,fontSize:10,color:"#94A3B8"}}>{items.length}件</span>
              <span className="inp-hd-arrow">{isOpen?"▲":"▼"}</span>
            </div>
            {isOpen&&(
              <>
                <div style={{overflowX:"auto"}}>
                  <table className="itbl">
                    <thead><tr>
                      <th>資産名</th>
                      <th style={{background:"#EFF6FF",color:"#1D4ED8"}}>現状 残高(万)</th>
                      <th style={{background:"#EFF6FF",color:"#1D4ED8"}}>現状 フロー(万/年)</th>
                      <th style={{background:"#F0FDF4",color:"#065F46"}}>対策後 残高(万)</th>
                      <th style={{background:"#F0FDF4",color:"#065F46"}}>対策後 フロー(万/年)</th>
                      <th style={{color:"#7C3AED"}}>利回り(年率)</th>
                      <th>コア</th>
                      <th></th>
                    </tr></thead>
                    <tbody>
                      {items.map(a=>(
                        <tr key={a.id}>
                          <td>
                            <input className="ni-name" value={a.name}
                              onChange={e=>updAsset(a.id,"name",e.target.value)}/>
                          </td>
                          <td style={{background:"rgba(239,246,255,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="10" value={a.sc}
                              onChange={e=>updAsset(a.id,"sc",e.target.value)} style={{color:"#1D4ED8"}}/>
                          </td>
                          <td style={{background:"rgba(239,246,255,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="1" value={a.fc}
                              onChange={e=>updAsset(a.id,"fc",e.target.value)} style={{color:"#1D4ED8"}}/>
                          </td>
                          <td style={{background:"rgba(240,253,244,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="10" value={a.sa}
                              onChange={e=>updAsset(a.id,"sa",e.target.value)} style={{color:"#059669"}}/>
                          </td>
                          <td style={{background:"rgba(240,253,244,.4)",textAlign:"center"}}>
                            <input className="ni" type="number" min="0" step="1" value={a.fa}
                              onChange={e=>updAsset(a.id,"fa",e.target.value)} style={{color:"#059669"}}/>
                          </td>
                          <td style={{textAlign:"center"}}>
                            <input className="ri" type="number" min="0" max="1" step="0.001" value={a.ret}
                              onChange={e=>updAsset(a.id,"ret",e.target.value)} style={{color:"#7C3AED"}}/>
                            <span style={{fontSize:9,color:"#94A3B8",marginLeft:2}}>({(a.ret*100).toFixed(1)}%)</span>
                          </td>
                          <td style={{textAlign:"center"}}>
                            <input type="checkbox" checked={!!a.isCore}
                              onChange={e=>updAsset(a.id,"isCore",e.target.checked)}/>
                          </td>
                          <td style={{textAlign:"center"}}>
                            <button className="btn-del" onClick={()=>delAsset(a.id)}>削除</button>
                          </td>
                        </tr>
                      ))}
                      <tr className="sub">
                        <td style={{paddingLeft:14,color:"#64748B"}}>小　計</td>
                        <td style={{textAlign:"center",color:"#1D4ED8"}}>{N(scT)}万</td>
                        <td style={{textAlign:"center",color:"#1D4ED8"}}>{N(fcT)}万/年</td>
                        <td style={{textAlign:"center",color:"#059669"}}>{N(saT)}万</td>
                        <td style={{textAlign:"center",color:"#059669"}}>{N(faT)}万/年</td>
                        <td colSpan={3}/>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <button className="btn-add" onClick={()=>addAsset(rg,tp)}>＋ 資産を追加</button>
              </>
            )}
          </div>
        );
      }))}
    </div>
  );
}

/* ─── Compare Page ─── */
function ComparePage({assets,cellData,totals,years}){
  const fvD=totals.fva-totals.fvc;
  const flD=totals.fa-totals.fc;
  const stD=totals.sa-totals.sc;
  const CCOR=["#2563EB","#F59E0B"];
  const CDOM=["#059669","#6366F1"];
  const CCLS=["#0EA5E9","#F97316","#8B5CF6"];

  const mkStats=(sc)=>{
    const tot=sc==="cur"?totals.sc:totals.sa;
    const pick=a=>sc==="cur"?a.sc:a.sa;
    const core=assets.reduce((s,a)=>a.isCore?s+pick(a):s,0);
    const dom =assets.reduce((s,a)=>a.region==="国内"?s+pick(a):s,0);
    const bond=assets.reduce((s,a)=>a.type==="現金・債券"?s+pick(a):s,0);
    const eq  =assets.reduce((s,a)=>a.type==="株式・投信"?s+pick(a):s,0);
    return{
      tot,
      cor:[{name:"コア",value:core,pct:P(core,tot)},{name:"サテライト",value:tot-core,pct:P(tot-core,tot)}],
      dom:[{name:"国内",value:dom,pct:P(dom,tot)},{name:"海外",value:tot-dom,pct:P(tot-dom,tot)}],
      cls:[{name:"現金・債券",value:bond,pct:P(bond,tot)},{name:"株式・投信",value:eq,pct:P(eq,tot)},{name:"その他",value:tot-bond-eq,pct:P(tot-bond-eq,tot)}],
    };
  };
  const cur=mkStats("cur"), aft=mkStats("aft");

  const DiffBadge=({v,unit})=>{
    if(Math.abs(v)<0.5) return <span style={{color:"#94A3B8"}}>変化なし</span>;
    return <span className={v>0?"diff-up":"diff-dn"}>{v>0?"▲":"▼"} {N(Math.abs(v))}{unit}</span>;
  };

  const DonutPair=({title,curD,aftD,colors})=>{
    const Leg=({data})=>(
      <div className="legend">
        {data.map((d,i)=>(
          <div key={i} className="legend-item">
            <div className="legend-dot" style={{background:colors[i%colors.length]}}/>
            <span style={{color:"#475569"}}>{d.name}</span>
            <strong style={{marginLeft:2}}>{d.pct}%</strong>
          </div>
        ))}
      </div>
    );
    return(
      <div className="card">
        <div className="card-hd">{title}</div>
        <div className="card-bd">
          <div className="donut-wrap">
            <div className="donut-half">
              <div className="donut-lbl c">現　状</div>
              <Donut data={curD} colors={colors} size={110}/>
              <Leg data={curD}/>
            </div>
            <div className="donut-sep"/>
            <div className="donut-half">
              <div className="donut-lbl a">対策後</div>
              <Donut data={aftD} colors={colors} size={110}/>
              <Leg data={aftD}/>
            </div>
          </div>
        </div>
      </div>
    );
  };

  const rgBar=REGIONS.map(rg=>({name:rg,cur:Math.round(TYPES.reduce((s,t)=>s+(cellData[`${rg}__${t}`]?.fvc||0),0)),aft:Math.round(TYPES.reduce((s,t)=>s+(cellData[`${rg}__${t}`]?.fva||0),0))})).filter(d=>d.cur>0||d.aft>0);
  const tyBar=TYPES.map(tp=>({name:tp==="現金・債券"?"債券":tp==="株式・投信"?"株式":tp,cur:Math.round(REGIONS.reduce((s,r)=>s+(cellData[`${r}__${tp}`]?.fvc||0),0)),aft:Math.round(REGIONS.reduce((s,r)=>s+(cellData[`${r}__${tp}`]?.fva||0),0))}));

  const rows=assets.filter(a=>a.sc>0||a.sa>0||a.fc>0||a.fa>0).map(a=>({
    ...a,fvc:fvCalc(a.sc,a.fc,a.ret,years),fva:fvCalc(a.sa,a.fa,a.ret,years),
  }));
  let prevR=null;

  return(
    <div className="page">
      <div className="sec-ttl">主要指標</div>
      <div className="kpi-grid">
        {[
          {ac:"bl",icon:"💰",title:"総資産（ストック）",cv:N(totals.sc)+"万",av:N(totals.sa)+"万",diff:<DiffBadge v={stD} unit="万"/>},
          {ac:"gr",icon:"📈",title:`${years}年後の予測資産`,cv:N(totals.fvc)+"万",av:N(totals.fva)+"万",diff:<DiffBadge v={fvD} unit="万"/>,hi:true},
          {ac:"am",icon:"💸",title:"年間フロー合計",cv:N(totals.fc)+"万/年",av:N(totals.fa)+"万/年",diff:<DiffBadge v={flD} unit="万/年"/>},
          {ac:"vi",icon:"🌏",title:"海外比率",cv:P(cur.tot-cur.dom[0]?.value||0,cur.tot)+"%",av:P(aft.tot-aft.dom[0]?.value||0,aft.tot)+"%",diff:<span style={{fontSize:10,color:"#94A3B8"}}>{cur.dom[1]?.pct}% → {aft.dom[1]?.pct}%</span>},
        ].map(({ac,icon,title,cv,av,diff,hi})=>(
          <div key={title} className={`kpi ${ac}`}>
            <div className="kpi-ttl">{icon} {title}</div>
            <div className="kpi-row">
              <div><span className="kpi-lbl c">現状</span><div className="kpi-val">{cv}</div></div>
              <div className="kpi-arr">→</div>
              <div><span className="kpi-lbl a">対策後</span><div className={`kpi-val${hi?" hi":""}`}>{av}</div></div>
            </div>
            <div className="kpi-note">{diff}</div>
          </div>
        ))}
      </div>

      <div className="sec-ttl">資産配分の比較（ストックベース）</div>
      <div className="donut-grid">
        <DonutPair title="コア / サテライト" curD={cur.cor} aftD={aft.cor} colors={CCOR}/>
        <DonutPair title="国内 / 海外" curD={cur.dom} aftD={aft.dom} colors={CDOM}/>
        <DonutPair title="資産クラス別" curD={cur.cls} aftD={aft.cls} colors={CCLS}/>
      </div>

      <div className="sec-ttl">{years}年後 予測資産の内訳</div>
      <div className="g2">
        <div className="card">
          <div className="card-hd">地域別（万円）</div>
          <div className="card-bd"><BarChart data={rgBar}/><BarLegend/></div>
        </div>
        <div className="card">
          <div className="card-hd">資産クラス別（万円）</div>
          <div className="card-bd"><BarChart data={tyBar}/><BarLegend/></div>
        </div>
      </div>

      <div className="sec-ttl">資産別 詳細比較</div>
      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table className="dtbl">
            <thead><tr>
              <th>地域</th><th>種別</th><th>資産名</th>
              <th className="r">現状 残高</th><th className="r">現状 フロー/年</th>
              <th className="r">対策後 残高</th><th className="r">対策後 フロー/年</th>
              <th className="r">利回り</th>
              <th className="r">{years}年後(現状)</th>
              <th className="r">{years}年後(対策後)</th>
              <th className="r">差　額</th>
            </tr></thead>
            <tbody>
              {rows.map((r,i)=>{
                const newR=r.region!==prevR;
                const isLast=i===rows.length-1||rows[i+1]?.region!==r.region;
                if(newR) prevR=r.region;
                const diff=r.fva-r.fvc;
                return(
                  <tr key={r.id} className={isLast?"grp-end":""}>
                    <td>{newR?<span className={`r-tag r-${r.region==="国内"?"dom":r.region==="先進国"?"dev":"em"}`}>{r.region}</span>:<span style={{color:"#E2E8F0"}}>│</span>}</td>
                    <td style={{color:"#94A3B8",fontSize:10}}>{r.type}</td>
                    <td>
                      <span className={`c-pill ${r.isCore?"c-core":"c-sat"}`}>{r.isCore?"コア":"衛星"}</span>
                      {" "}<span style={{fontWeight:600,color:"#334155"}}>{r.name}</span>
                    </td>
                    <td style={{textAlign:"right",fontWeight:700}}>{N(r.sc)}万</td>
                    <td style={{textAlign:"right",color:r.fc>0?"#2563EB":"#CBD5E1"}}>{r.fc>0?N(r.fc)+"万":"—"}</td>
                    <td style={{textAlign:"right",fontWeight:700,color:r.sa!==r.sc?"#059669":"#1E293B"}}>{N(r.sa)}万{r.sa!==r.sc&&<span style={{fontSize:8,marginLeft:2,color:"#059669"}}>変更</span>}</td>
                    <td style={{textAlign:"right",color:r.fa>0?"#059669":r.fc>0?"#DC2626":"#CBD5E1"}}>{r.fa>0?N(r.fa)+"万":r.fc>0?<span style={{color:"#DC2626"}}>停止</span>:"—"}</td>
                    <td style={{textAlign:"right",color:"#7C3AED"}}>{(r.ret*100).toFixed(1)}%</td>
                    <td style={{textAlign:"right",color:"#475569"}}>{N(r.fvc)}万</td>
                    <td style={{textAlign:"right",fontWeight:700}}>{N(r.fva)}万</td>
                    <td style={{textAlign:"right",fontWeight:700,color:diff>1?"#059669":diff<-1?"#DC2626":"#94A3B8"}}>
                      {diff>1?`▲${N(diff)}万`:diff<-1?`▼${N(Math.abs(diff))}万`:"—"}
                    </td>
                  </tr>
                );
              })}
              <tr className="tot-row">
                <td colSpan={3} style={{paddingLeft:14,color:"#64748B"}}>合　計</td>
                <td style={{textAlign:"right",color:"#2563EB",fontSize:12}}>{N(totals.sc)}万</td>
                <td style={{textAlign:"right",color:"#2563EB"}}>{N(totals.fc)}万/年</td>
                <td style={{textAlign:"right",color:"#059669",fontSize:12}}>{N(totals.sa)}万</td>
                <td style={{textAlign:"right",color:"#059669"}}>{N(totals.fa)}万/年</td>
                <td/>
                <td style={{textAlign:"right",color:"#2563EB",fontWeight:800,fontSize:12}}>{N(totals.fvc)}万</td>
                <td style={{textAlign:"right",color:"#059669",fontWeight:800,fontSize:12}}>{N(totals.fva)}万</td>
                <td style={{textAlign:"right"}}>{fvD>0?<span className="diff-up">▲{N(fvD)}万</span>:fvD<0?<span className="diff-dn">▼{N(Math.abs(fvD))}万</span>:"—"}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const [tab,setTab]=useState("matrix");
  const [years,setYears]=useState(10);
  const [assets,setAssets]=useState(INIT);
  const [scenario,setScenario]=useState("cur");
  const [metric,setMetric]=useState("stock");

  const updAsset=useCallback((id,field,val)=>
    setAssets(p=>p.map(a=>a.id===id
      ?{...a,[field]:(field==="name"||field==="isCore")?val:(parseFloat(val)||0)}
      :a)),[]);
  const addAsset=useCallback((region,type)=>
    setAssets(p=>[...p,{id:uid(),name:"新規資産",region,type,isCore:true,ret:0.03,sc:0,fc:0,sa:0,fa:0}]),[]);
  const delAsset=useCallback(id=>setAssets(p=>p.filter(a=>a.id!==id)),[]);

  const cellData=useMemo(()=>{
    const d={};
    REGIONS.forEach(r=>TYPES.forEach(t=>{
      const items=assets.filter(a=>a.region===r&&a.type===t);
      d[`${r}__${t}`]={
        items,
        sc:items.reduce((s,a)=>s+a.sc,0),fc:items.reduce((s,a)=>s+a.fc,0),
        sa:items.reduce((s,a)=>s+a.sa,0),fa:items.reduce((s,a)=>s+a.fa,0),
        fvc:items.reduce((s,a)=>s+fvCalc(a.sc,a.fc,a.ret,years),0),
        fva:items.reduce((s,a)=>s+fvCalc(a.sa,a.fa,a.ret,years),0),
      };
    }));
    return d;
  },[assets,years]);

  const totals=useMemo(()=>({
    sc:assets.reduce((s,a)=>s+a.sc,0),fc:assets.reduce((s,a)=>s+a.fc,0),
    sa:assets.reduce((s,a)=>s+a.sa,0),fa:assets.reduce((s,a)=>s+a.fa,0),
    fvc:assets.reduce((s,a)=>s+fvCalc(a.sc,a.fc,a.ret,years),0),
    fva:assets.reduce((s,a)=>s+fvCalc(a.sa,a.fa,a.ret,years),0),
  }),[assets,years]);

  const common={assets,cellData,totals,years};
  return(
    <div>
      <Nav tab={tab} setTab={setTab} years={years} setYears={setYears}/>
      {tab==="matrix" &&<MatrixPage {...common} scenario={scenario} setScenario={setScenario} metric={metric} setMetric={setMetric}/>}
      {tab==="input"  &&<InputPage  {...common} updAsset={updAsset} addAsset={addAsset} delAsset={delAsset}/>}
      {tab==="compare"&&<ComparePage {...common}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
